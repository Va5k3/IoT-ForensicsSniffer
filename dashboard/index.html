<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>IoT Forensics Dashboard</title>
    <style>
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        font-family: 'Arial', sans-serif;
        min-height: 100vh;
        padding: 30px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 30px;
        color: #00d4ff;
        border-bottom: 2px solid #00d4ff33;
        padding-bottom: 15px;
    }

    h2 {
        font-size: 18px;
        color: #00d4ff;
        margin: 30px 0 15px 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    /* ── KARTICE ─────────────────────────── */
    .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
    }

    .card {
        background: linear-gradient(135deg, #1a1a3e, #16213e);
        border: 1px solid #00d4ff33;
        padding: 25px;
        border-radius: 12px;
        flex: 1;
        text-align: center;
        transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        border-color: #00d4ff;
    }

    .card p {
        font-size: 13px;
        color: #8888aa;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .card h2 {
        font-size: 42px;
        color: #00d4ff;
        margin: 0;
        letter-spacing: 0;
        text-transform: none;
    }

    /* ── TABELA ──────────────────────────── */
    table {
        width: 100%;
        border-collapse: collapse;
        background: #16213e;
        border-radius: 12px;
        overflow: hidden;
    }

    thead {
        background: #0f3460;
    }

    th {
        padding: 14px 16px;
        text-align: left;
        color: #00d4ff;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    td {
        padding: 12px 16px;
        border-bottom: 1px solid #ffffff11;
        font-size: 14px;
    }

    tr:hover td {
        background: #ffffff08;
    }

    /* ── SEVERITY BOJE ───────────────────── */
    .critical {
        color: #ff4444;
        font-weight: bold;
    }

    .high {
        color: #ff8800;
        font-weight: bold;
    }

    .medium {
        color: #ffcc00;
    }

    .low {
        color: #00cc88;
    }

    /* ── NAPADAČI LISTA ──────────────────── */
    .attacker-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #ffffff11;
    }

    .attacker-ip {
        width: 120px;
        font-family: monospace;
        color: #ff4444;
    }

    .attacker-bar-wrap {
        flex: 1;
        background: #ffffff11;
        border-radius: 4px;
        height: 18px;
        overflow: hidden;
    }

    .attacker-bar {
        height: 100%;
        background: linear-gradient(90deg, #ff4444, #ff8800);
        border-radius: 4px;
        transition: width 1s ease;
    }

    .attacker-count {
        width: 80px;
        text-align: right;
        color: #8888aa;
        font-size: 13px;
    }

    /* ── TABOVI ──────────────────────────── */
    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }

    .tab {
        background: #16213e;
        color: #8888aa;
        border: 1px solid #ffffff22;
        padding: 10px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
    }

    .tab:hover {
        border-color: #00d4ff;
        color: #00d4ff;
    }

    .tab.active {
        background: #00d4ff22;
        border-color: #00d4ff;
        color: #00d4ff;
        font-weight: bold;
    }
    
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<h1>🔍 IoT Forensics Dashboard</h1>
<p id="last-refresh" style="color:#8888aa; font-size:12px; margin-bottom:20px;">
    Učitavam...
</p>

<!-- TABOVI -->
<div class="tabs">
    <button class="tab active" onclick="showTab('stats')">📊 Stats</button>
    <button class="tab" onclick="showTab('napadaci')">⚠️ Napadači</button>
    <button class="tab" onclick="showTab('anomalije')">🔴 Anomalije</button>
    <button class="tab" onclick="showTab('timeline')">📈 Timeline</button>
</div>

<!-- TAB: STATS -->
<div id="tab-stats" class="tab-content">
    <div class="stats">
        <div class="card">
            <p>Ukupno paketa</p>
            <h2 id="total-packets">...</h2>
        </div>
        <div class="card">
            <p>Anomalija</p>
            <h2 id="total-anomalies">...</h2>
        </div>
        <div class="card">
            <p>Napadača</p>
            <h2 id="unique-attackers">...</h2>
        </div>
    </div>
</div>

<!-- TAB: NAPADAČI -->
<div id="tab-napadaci" class="tab-content" style="display:none">
    <h2>Top napadači</h2>
    <div id="attackers-list">Učitavam...</div>
</div>

<!-- TAB: ANOMALIJE -->
<div id="tab-anomalije" class="tab-content" style="display:none">
    <h2>Zadnje anomalije</h2>
    <table>
        <thead>
            <tr>
                <th>Vrijeme</th>
                <th>IP</th>
                <th>Tip</th>
                <th>Severity</th>
                <th>Opis</th>
            </tr>
        </thead>
        <tbody id="anomalies-table"></tbody>
    </table>
</div>
<!-- TAB: TIMELINE -->
<div id="tab-timeline" class="tab-content" style="display:none">
    <h2>Anomalije po vremenu</h2>
    <div style="background:#16213e; border-radius:12px; padding:20px; margin-top:10px">
        <canvas id="timelineChart"></canvas>
    </div>
</div>


<script>
    // ── TAB LOGIKA ────────────────────────────────
    // Ova funkcija se poziva kad klikneš na tab dugme
    function showTab(name) {
        // 1. Sakrij sve tab-content divove
        document.querySelectorAll('.tab-content').forEach(div => {
            div.style.display = 'none';
        });

        // 2. Ukloni 'active' klasu sa svih tabova
        document.querySelectorAll('.tab').forEach(btn => {
            btn.classList.remove('active');
        });

        // 3. Prikaži odabrani tab
        document.getElementById('tab-' + name).style.display = 'block';

        // 4. Dodaj 'active' klasu na kliknuto dugme
        event.target.classList.add('active');
    }

    // ── UČITAJ PODATKE ────────────────────────────
    
    fetch("http://localhost:5000/api/attackers")
        .then(r => r.json())
        .then(data => {
            let list = document.getElementById("attackers-list");
            list.innerHTML = "";
            let max = data[0].anomaly_count;
            data.forEach(a => {
                let posto = (a.anomaly_count / max * 100).toFixed(1);
                list.innerHTML += `
                    <div class="attacker-item">
                        <span class="attacker-ip">${a.ip}</span>
                        <div class="attacker-bar-wrap">
                            <div class="attacker-bar" style="width: ${posto}%"></div>
                        </div>
                        <span class="attacker-count">${a.anomaly_count}</span>
                    </div>
                `;
            });
        });

    fetch("http://localhost:5000/api/anomalies")
        .then(r => r.json())
        .then(data => {
            let tbody = document.getElementById("anomalies-table");
            tbody.innerHTML = "";
            data.forEach(a => {
                tbody.innerHTML += `
                    <tr>
                        <td>${a.timestamp}</td>
                        <td>${a.ip}</td>
                        <td>${a.type}</td>
                        <td class="${a.severity.toLowerCase()}">${a.severity}</td>
                        <td>${a.description}</td>
                    </tr>
                `;
            });
        });
        // ── TIMELINE GRAF ─────────────────────────────
        let timelineChart = null;

        function loadTimeline() {
            fetch("http://localhost:5000/api/timeline")
                .then(r => r.json())
                .then(data => {
                    // Izvuci labele (vremena) i vrijednosti (brojevi)
                    let labels = data.map(d => d.time);
                    let counts = data.map(d => d.count);

                    if (timelineChart) {
                        // Ako graf već postoji, samo ažuriraj podatke
                        timelineChart.data.labels = labels;
                        timelineChart.data.datasets[0].data = counts;
                        timelineChart.update();
                        return;
                    }

                    // Kreiraj novi graf
                    let ctx = document.getElementById("timelineChart").getContext("2d");
                    timelineChart = new Chart(ctx, {
                        type: "line",
                        data: {
                            labels: labels,
                            datasets: [{
                                label: "Anomalije",
                                data: counts,
                                borderColor: "#ff4444",
                                backgroundColor: "#ff444422",
                                borderWidth: 2,
                                pointBackgroundColor: "#ff4444",
                                pointRadius: 4,
                                fill: true,
                                tension: 0.4  // Zaobljene linije
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    labels: { color: "white" }
                                }
                            },
                            scales: {
                                x: {
                                    ticks: { color: "#8888aa" },
                                    grid:  { color: "#ffffff11" }
                                },
                                y: {
                                    ticks: { color: "#8888aa" },
                                    grid:  { color: "#ffffff11" },
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                });
        }

        // Učitaj timeline kad se klikne tab
        // Ažuriraj showTab funkciju da poziva loadTimeline
        const originalShowTab = showTab;
        showTab = function(name) {
            originalShowTab.call(this, name);
            if (name === 'timeline') loadTimeline();
        }
        
        // ── LIVE REFRESH ─────────────────────────────
        // setInterval poziva funkciju svake X milisekundi
        // 30000ms = 30 sekundi

        function refreshData() {
        fetch("http://localhost:5000/api/stats")
            .then(r => r.json())
            .then(data => {
                document.getElementById("total-packets").textContent = data.total_packets;
                document.getElementById("total-anomalies").textContent = data.total_anomalies;
                document.getElementById("unique-attackers").textContent = data.unique_attackers;

                // Ažuriraj vrijeme zadnjeg refresha
                let sada = new Date().toLocaleTimeString();
                document.getElementById("last-refresh").textContent = `Zadnji refresh: ${sada}`;
            });
    }

    // Pokreni odmah pri učitavanju stranice
    refreshData();

    // Pa ponavljaj svakih 30 sekundi
    setInterval(refreshData, 10000);
</script>
</body>
</html>
